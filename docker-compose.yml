version: '3.8'

services:
  # MLflow Tracking Server
  mlflow:
    build:
      context: .
      target: mlflow
    container_name: loan-mlflow
    ports:
      - "5000:5000"
    volumes:
      - ./mlruns:/app/mlruns
      - ./mlartifacts:/app/mlartifacts
      - ./mlflow.db:/app/mlflow.db
    networks:
      - loan-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:5000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # FastAPI Backend
  api:
    build:
      context: .
      target: api
    container_name: loan-api
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
      - ./backend:/app/backend
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - MODEL_PATH=/app/models/model.pkl
    depends_on:
      - mlflow
    networks:
      - loan-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Streamlit Frontend
  frontend:
    build:
      context: .
      target: frontend
    container_name: loan-frontend
    ports:
      - "8501:8501"
    volumes:
      - ./frontend:/app/frontend
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
    networks:
      - loan-network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8501/_stcore/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  loan-network:
    driver: bridge

volumes:
  mlruns-data:
  mlartifacts-data:
