preprocess:
  test_size: 0.2
  random_state: 42
  handle_missing: true
  missing_strategy: median

feature_engineering:
  create_debt_income_ratio: true
  create_credit_utilization_bins: true
  create_age_bins: true
  
train:
  test_size: 0.2
  random_state: 42
  cv_folds: 5
  handle_imbalance: true
  imbalance_strategy: SMOTE

model:
  algorithm: xgboost
  xgboost:
    n_estimators: 200
    max_depth: 6
    learning_rate: 0.05
    min_child_weight: 1
    subsample: 0.8
    colsample_bytree: 0.8
    gamma: 0.1
    reg_alpha: 0.1
    reg_lambda: 1.0
    scale_pos_weight: 15
    random_state: 42
  
  random_forest:
    n_estimators: 200
    max_depth: 15
    min_samples_split: 10
    min_samples_leaf: 4
    random_state: 42
    
  logistic_regression:
    C: 1.0
    max_iter: 1000
    random_state: 42

mlflow:
  experiment_name: loan-default-prediction
  tracking_uri: http://localhost:5000
  model_name: loan_default_classifier
